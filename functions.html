      }

      let count = 0; // Global

      // A switch function
      function cardCounter(card) {
      if (card >= 2 && card <= 10) card = +card;
      switch (card) {
         case 2:
         case 3:
         case 4:
         case 5:
         case 6:
            count++;
            console.log(count);
            break;
         case 7:
         case 8:
         case 9:
            break;
         case 10: 
            count--; break;
         default: break;
      }

      if (count > 0)  return count + " Bet";
      else return count + " Hold";

      
}
